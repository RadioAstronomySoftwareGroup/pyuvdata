name: Warning Tests

on:
  push:
    # This should disable running the workflow on tags, according to the
    # on.<push|pull_request>.<branches|tags> GitHub Actions docs.
    branches:
      - "*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  warning_test:
    name: Warning Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: 3.13
            pip-options: "dev"
            pytest-options: "--cov=pyuvdata --cov-config=.coveragerc --cov-report xml:coverage.xml"
          # currently (April 2026), python-casacore does not build properly from pypi on python 3.14
          - python-version: 3.14
            pip-options: "test"
            pytest-options: ""
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          CFLAGS="-DCYTHON_TRACE=1 -DCYTHON_TRACE_NOGIL=1" pip install -e .[${{ matrix.pip-options }}]
          pip install pytest-xdist

      - name: Environment Info
        run: |
          pip list

      - name: Run Tests
        run: |
          pytest -W error -n auto ${{ matrix.pytest-options }}

      - uses: codecov/codecov-action@v5
        if: success()
        with:
          token: ${{secrets.CODECOV_TOKEN}} #required
          files: ./coverage.xml #optional
